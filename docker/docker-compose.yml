version: "3.9"

services:
  db:
    image: postgres:15
    container_name: ideaapp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ideaapp
      POSTGRES_PASSWORD: ideaapp
      POSTGRES_DB: ideaapp
    ports:
      - "5432:5432"
    volumes:
      - ideaapp-db:/var/lib/postgresql/data
      - ../database/init:/docker-entrypoint-initdb.d

  backend:
    build:
      context: ../
      dockerfile: docker/backend.Dockerfile
    container_name: ideaapp-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://ideaapp:ideaapp@db:5432/ideaapp
      JWT_SECRET: change_me_to_a_long_random_string
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN: 30d
      SOCKET_IO_PATH: /socket.io
      ERP_BASE_URL: https://erp.example.com
      ERP_API_KEY: replace_me
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      - db

  frontend:
    build:
      context: ../
      dockerfile: docker/frontend.Dockerfile
    container_name: ideaapp-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  ideaapp-db:
